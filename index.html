<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLASS SYSTEM ACCESS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#terminal{
    padding:25px;
    font-size:20px;
    white-space:pre-line;
    line-height:1.6;
}

.glow{
    text-shadow:0 0 10px #00ff66;
}

.cursor{
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

.glitch{
    animation:flicker 2s infinite;
}

@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:0.85;}
}
</style>
</head>

<body>

<div id="terminal" class="glow glitch"></div>

<!-- 🔊 صوت -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/magic-chime.mp3">
</audio>

<script>

const lines = [
"Connecting to school system... | جاري الاتصال بالنظام...",
"Establishing secure link... | إنشاء اتصال آمن...",

"",
"Access Granted ✔ | تم السماح بالدخول ✔",

"",
"Scanning device... | جاري فحص الجهاز...",
"████████████ 100%",

"",
"📱 Device Found | تم العثور على الجهاز",
"🧠 Curiosity Level: HIGH | الفضول: عالي جدًا 😏",
"😴 Sleep Level: VERY HIGH | النوم: وضع العطلة 😴",
"📚 Summer Homework: NONE DETECTED | لا يوجد واجبات 🎉",

"",
"Searching identity... | جاري تحديد الهوية...",
"👤 Student recognized | تم التعرف على الطالب",

"",
"😂 لا تخاف | Don’t worry 😂",
"هذا مجرد مقلب بسيط | Just a fun prank 😎",

"",
"🎉 ACCESS CONFIRMED | تم تأكيد الدخول",
"🟢 Status: Summer Mode | الحالة: عطلة رسمية",

"",
"🔥 استمتع قبل العودة للواقع | Enjoy before reality returns",

"",
"──────────────",
"System Status: CLOSED | تم إغلاق النظام",
"All checks completed ✔ | تم الانتهاء من الفحص ✔",
"No issues detected 😎 | لا توجد مشاكل 😎",

"",
"مع تحيات | Regards",
"أستاذ خالد 🤍",

"",
"█"
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine(){
    if(i < lines.length){
        terminal.innerHTML += lines[i] + "\n";
        window.scrollTo(0, document.body.scrollHeight);

        let delay = 600 + Math.random() * 200;

        i++;
        setTimeout(typeLine, delay);
    } else {
        terminal.innerHTML += "<span class='cursor'>█</span>";
    }
}

typeLine();

/* 🔊 صوت مضمون عند أول تفاعل */
function playSound(){
    const s = document.getElementById("sound");
    s.volume = 0.6;
    s.play().catch(()=>{});
}

document.addEventListener("click", playSound, { once:true });
document.addEventListener("touchstart", playSound, { once:true });

</script>

</body>
</html>
