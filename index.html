<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CLASS SYSTEM ACCESS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#terminal{
    padding:30px;
    font-size:20px;
    white-space:pre-line;
    line-height:1.6;
}

.cursor{
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

.glow{
    text-shadow:0 0 10px #00ff66;
}

/* glitch خفيف */
.glitch{
    animation: flicker 2s infinite;
}

@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:0.85;}
}
</style>
</head>

<body>

<div id="terminal" class="glow glitch"></div>

<!-- 🔊 صوت -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/magic-chime.mp3">
</audio>

<script>

const lines = [
"Connecting to school system...",
"Establishing secure link...",
"",
"Access Granted ✔",
"",
"Scanning device...",
"████████████ 100%",
"",
"Analyzing student profile...",
"",
"📱 Device Found",
"🧠 Curiosity Level: HIGH",
"😴 Sleep Level: VERY HIGH",
"📚 Summer Homework: NONE DETECTED",
"",
"Searching identity...",
"",
"👤 Student recognized...",
"",
"😂😂😂",
"",
"لا تخاف 😎",
"هذا مجرد مقلب بسيط...",
"",
"🎉 ACCESS CONFIRMED",
"🟢 الحالة: عطلة رسمية",
"",
"🔥 استمتع قبل العودة للواقع",
"",
"──────────────",
"مع تحيات",
"أستاذ خالد 🤍",
"",
"█"
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine(){
    if(i < lines.length){
        terminal.innerHTML += lines[i] + "\n";
        window.scrollTo(0, document.body.scrollHeight);

        let delay = (lines[i] === "" ? 450 : 650);

        i++;
        setTimeout(typeLine, delay);
    } else {
        terminal.innerHTML += "<span class='cursor'>█</span>";
    }
}

typeLine();

/* 🔊 صوت مضمون بعد أول تفاعل */
function playSound(){
    document.getElementById("sound").play().catch(()=>{});
}

document.addEventListener("click", playSound, { once:true });
document.addEventListener("touchstart", playSound, { once:true });

</script>

</body>
</html>
