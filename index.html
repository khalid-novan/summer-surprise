<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CLASS SYSTEM VIP</title>

<style>
body{
  margin:0;
  font-family: monospace;
  background:black;
  color:#00ff99;
  text-align:center;
  overflow:hidden;
}

.screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
}

.glitch{
  animation:blink 0.7s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

.bar{
  width:300px;
  height:10px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#00ff99;
  animation:load 2.8s forwards;
}

@keyframes load{
  100%{width:100%;}
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="screen" id="boot">
  <h2 class="glitch">🔐 SYSTEM ACCESSING...</h2>
  <p>Scanning student profile...</p>
  <div class="bar"><div class="fill"></div></div>
  <p id="status">Loading data...</p>
</div>

<div class="screen hidden" id="main">
  <h1>🎉 ACCESS GRANTED</h1>
  <h2 id="student"></h2>

  <p style="color:white">
    الوضع الحالي: <b>🟢 عطلة رسمية</b>
  </p>

  <h2 id="msg"></h2>
</div>

<!-- 🔊 صوت -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/magic-chime.mp3" type="audio/mpeg">
</audio>

<script>

const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "طالب مجهول";

document.getElementById("student").innerText =
"👤 " + name;

// رسائل تحميل
let texts = [
"Checking homework...",
"Deleting stress files...",
"Analyzing behavior...",
"Bypassing school rules...",
"Finalizing access..."
];

let i = 0;
let interval = setInterval(()=>{
  document.getElementById("status").innerText = texts[i];
  i++;
  if(i >= texts.length) clearInterval(interval);
},600);

// الانتقال التلقائي
setTimeout(()=>{
  document.getElementById("boot").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");

  // 🎵 تشغيل الصوت
  document.getElementById("sound").play();

  const msgs = [
    "😌 لا واجبات... روح نام وانت مرتاح",
    "🎉 تم تأكيد: العطلة فعالة 100%",
    "😎 النظام لا يجد أي دراسة حالياً",
    "🚫 التفكير بالدراسة غير مسموح",
    "🔥 استمتع قبل العودة للواقع"
  ];

  document.getElementById("msg").innerText =
    msgs[Math.floor(Math.random()*msgs.length)];

},3000);

</script>

</body>
</html>
