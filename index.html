<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CLASS SYSTEM ACCESS</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#terminal{
    padding:30px;
    font-size:22px;
    white-space:pre-line;
    line-height:1.6;
}

.cursor{
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* تحسين بسيط للإحساس */
.glow{
    text-shadow: 0 0 10px #00ff66;
}

</style>
</head>

<body>

<div id="terminal" class="glow"></div>

<!-- 🔊 صوت خفيف -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/magic-chime.mp3">
</audio>

<script>

const lines = [
"Connecting to school system...",
"Establishing secure link...",
"",
"Access Granted ✔",
"",
"Scanning device...",
"████████████ 100%",
"",
"Analyzing student profile...",
"",
"📱 Device Found",
"🧠 Curiosity Level: HIGH",
"😴 Sleep Level: VERY HIGH",
"📚 Summer Homework: NONE DETECTED",
"",
"Searching identity...",
"",
"👤 Student recognized...",
"",
"😂😂😂",
"",
"لا تخاف 😎",
"",
"هذا مجرد مقلب بسيط...",
"",
"🎉 ACCESS CONFIRMED",
"🟢 الحالة: عطلة رسمية",
"",
"🔥 استمتع قبل العودة للواقع"
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine(){
    if(i < lines.length){
        terminal.innerHTML += lines[i] + "\n";
        window.scrollTo(0, document.body.scrollHeight);
        i++;

        // سرعة ذكية (أجمل من الثابت)
        let delay = (lines[i] === "" ? 500 : 700);

        setTimeout(typeLine, delay);
    }
    else{
        terminal.innerHTML += "\n<span class='cursor'>█</span>";

        // تشغيل الصوت عند النهاية
        document.getElementById("sound").play().catch(()=>{});
    }
}

typeLine();

</script>

</body>
</html>
